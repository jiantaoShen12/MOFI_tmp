<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2c61"/>
      <stop offset="50%" stop-color="#be4673"/>
      <stop offset="100%" stop-color="#f2af32"/>
    </linearGradient>
  </defs>
  <!-- Central perturbation node -->
  <circle cx="40" cy="40" r="10" fill="url(#g3)" opacity="0.9"/>
  <!-- Perturbation waves -->
  <circle cx="40" cy="40" r="18" stroke="#be4673" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="40" cy="40" r="26" stroke="#be4673" stroke-width="1" fill="none" opacity="0.2"/>
  <!-- Connected omics nodes -->
  <circle cx="18" cy="22" r="5" fill="#1f2c61" opacity="0.8"/>
  <circle cx="62" cy="22" r="5" fill="#be4673" opacity="0.8"/>
  <circle cx="62" cy="58" r="5" fill="#f2af32" opacity="0.8"/>
  <circle cx="18" cy="58" r="5" fill="#1f2c61" opacity="0.6"/>
  <!-- Influence arrows -->
  <path d="M28 30 L35 36" stroke="#1f2c61" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M52 30 L45 36" stroke="#be4673" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M52 50 L45 44" stroke="#f2af32" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M28 50 L35 44" stroke="#1f2c61" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Feedback loops (curved) -->
  <path d="M48 32 Q56 28 55 22" stroke="#be4673" stroke-width="1" stroke-linecap="round" fill="none" stroke-dasharray="2,2"/>
  <path d="M32 48 Q24 52 25 58" stroke="#1f2c61" stroke-width="1" stroke-linecap="round" fill="none" stroke-dasharray="2,2"/>
